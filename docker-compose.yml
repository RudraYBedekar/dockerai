version: '3.8'

services:
  app:
    container_name: dockmate-ai-container
    image: dockmate-ai
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:8000"
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
